<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Particles</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      overflow: hidden;
      background-color: #000308;
      color: white;
      font-family: 'Courier New', monospace;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #loading {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #000308;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      transition: opacity 0.6s ease-out;
    }
    #loading span {
      font-size: 14px;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }
    #progress-container {
      width: 60%;
      max-width: 240px;
      height: 4px;
      background-color: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      overflow: hidden;
    }
    #progress {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00a2ff, #00ffea);
      transition: width 0.3s ease;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div id="loading">
    <span>Initializing Particles...</span>
    <div id="progress-container">
      <div id="progress"></div>
    </div>
  </div>

  <canvas id="webglCanvas"></canvas>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/",
        "animejs": "https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.es.js",
        "simplex-noise": "https://esm.sh/simplex-noise@4.0.1"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import anime from 'animejs';
    import { createNoise3D, createNoise4D } from 'simplex-noise';

    let scene, camera, renderer, controls, clock;
    let composer, bloomPass;
    let particlesGeometry, particlesMaterial, particleSystem;
    let currentPositions, sourcePositions, targetPositions, swarmPositions;
    let particleSizes, particleOpacities, particleEffectStrengths;
    let noise3D, noise4D;
    let morphTimeline = null;
    let isInitialized = false;
    let isMorphing = false;

    const CONFIG = {
      particleCount: 15000,
      shapeSize: 14,
      swarmDistanceFactor: 1.5,
      swirlFactor: 4.0,
      noiseFrequency: 0.1,
      noiseTimeScale: 0.04,
      noiseMaxStrength: 2.8,
      colorScheme: 'blue',
      morphDuration: 4000,
      particleSizeRange: [0.08, 0.25],
      starCount: 18000,
      bloomStrength: 1.3,
      bloomRadius: 0.5,
      bloomThreshold: 0.05,
      idleFlowStrength: 0.25,
      idleFlowSpeed: 0.08,
      idleRotationSpeed: 0.02,
      morphSizeFactor: 0.5,
      morphBrightnessFactor: 0.6
    };

    const SHAPES = [
      { name: 'Sphere', generator: generateSphere },
      { name: 'Cube', generator: generateCube },
      { name: 'Pyramid', generator: generatePyramid },
      { name: 'Torus', generator: generateTorus },
      { name: 'Galaxy', generator: generateGalaxy },
      { name: 'Wave', generator: generateWave }
    ];
    let currentShapeIndex = 0;
    const morphState = { progress: 0.0 };

    const COLOR_SCHEMES = {
      blue: { startHue: 200, endHue: 240, saturation: 0.92, lightness: 0.62 },
      fire: { startHue: 0, endHue: 45, saturation: 0.95, lightness: 0.6 },
      neon: { startHue: 300, endHue: 180, saturation: 1.0, lightness: 0.65 },
      nature: { startHue: 90, endHue: 160, saturation: 0.85, lightness: 0.55 },
      rainbow: { startHue: 0, endHue: 360, saturation: 0.9, lightness: 0.6 }
    };

    const tempVec = new THREE.Vector3();
    const sourceVec = new THREE.Vector3();
    const targetVec = new THREE.Vector3();
    const swarmVec = new THREE.Vector3();
    const noiseOffset = new THREE.Vector3();
    const flowVec = new THREE.Vector3();
    const bezPos = new THREE.Vector3();
    const swirlAxis = new THREE.Vector3();
    const currentVec = new THREE.Vector3();

    function generateSphere(count, size) {
      const points = new Float32Array(count * 3);
      const phi = Math.PI * (Math.sqrt(5) - 1);
      for (let i = 0; i < count; i++) {
        const y = 1 - (i / (count - 1)) * 2;
        const radius = Math.sqrt(1 - y * y);
        const theta = phi * i;
        points[i*3] = Math.cos(theta) * radius * size;
        points[i*3+1] = y * size;
        points[i*3+2] = Math.sin(theta) * radius * size;
      }
      return points;
    }
    function generateCube(count, size) {
      const points = new Float32Array(count * 3);
      const h = size / 2;
      for (let i = 0; i < count; i++) {
        const face = Math.floor(Math.random() * 6);
        const u = Math.random() * size - h;
        const v = Math.random() * size - h;
        switch (face) {
          case 0: points.set([h, u, v], i*3); break;
          case 1: points.set([-h, u, v], i*3); break;
          case 2: points.set([u, h, v], i*3); break;
          case 3: points.set([u, -h, v], i*3); break;
          case 4: points.set([u, v, h], i*3); break;
          case 5: points.set([u, v, -h], i*3); break;
        }
      }
      return points;
    }
    function generatePyramid(count, size) {
      const points = new Float32Array(count * 3);
      const halfBase = size / 2;
      const height = size * 1.2;
      const apex = new THREE.Vector3(0, height / 2, 0);
      const bv = [
        new THREE.Vector3(-halfBase, -height/2, -halfBase),
        new THREE.Vector3( halfBase, -height/2, -halfBase),
        new THREE.Vector3( halfBase, -height/2,  halfBase),
        new THREE.Vector3(-halfBase, -height/2,  halfBase)
      ];
      const baseArea = size * size;
      const sideFaceHeight = Math.sqrt(height * height + halfBase * halfBase);
      const sideFaceArea = 0.5 * size * sideFaceHeight;
      const totalArea = baseArea + 4 * sideFaceArea;
      const baseWeight = baseArea / totalArea;
      const sideWeight = sideFaceArea / totalArea;
      for (let i = 0; i < count; i++) {
        const r = Math.random();
        let p = new THREE.Vector3();
        if (r < baseWeight) {
          const u = Math.random(), v = Math.random();
          p.lerpVectors(bv[0], bv[1], u);
          const p2 = new THREE.Vector3().lerpVectors(bv[3], bv[2], u);
          p.lerp(p2, v);
        } else {
          const fi = Math.floor((r - baseWeight) / sideWeight);
          const v1 = bv[fi], v2 = bv[(fi + 1) % 4];
          let u = Math.random(), v = Math.random();
          if (u + v > 1) { u = 1 - u; v = 1 - v; }
          p.addVectors(v1, tempVec.subVectors(v2, v1).multiplyScalar(u));
          p.add(tempVec.subVectors(apex, v1).multiplyScalar(v));
        }
        points.set([p.x, p.y, p.z], i*3);
      }
      return points;
    }
    function generateTorus(count, size) {
      const points = new Float32Array(count * 3);
      const R = size * 0.7, r = size * 0.3;
      for (let i = 0; i < count; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.random() * Math.PI * 2;
        points[i*3]   = (R + r * Math.cos(phi)) * Math.cos(theta);
        points[i*3+1] = r * Math.sin(phi);
        points[i*3+2] = (R + r * Math.cos(phi)) * Math.sin(theta);
      }
      return points;
    }
    function generateGalaxy(count, size) {
      const points = new Float32Array(count * 3);
      const arms = 4, armWidth = 0.6, bulgeFactor = 0.3;
      for (let i = 0; i < count; i++) {
        const t = Math.pow(Math.random(), 1.5);
        const radius = t * size;
        const armIndex = Math.floor(Math.random() * arms);
        const armOffset = (armIndex / arms) * Math.PI * 2;
        const angle = armOffset + (radius / size) * 6;
        const spread = (Math.random() - 0.5) * armWidth * (1 - radius / size);
        const theta = angle + spread;
        points[i*3]   = radius * Math.cos(theta);
        points[i*3+1] = (Math.random() - 0.5) * size * 0.1 * (1 - radius / size * bulgeFactor);
        points[i*3+2] = radius * Math.sin(theta);
      }
      return points;
    }
    function generateWave(count, size) {
      const points = new Float32Array(count * 3);
      const waveScale = size * 0.4, frequency = 3;
      for (let i = 0; i < count; i++) {
        const u = Math.random() * 2 - 1, v = Math.random() * 2 - 1;
        const dist = Math.sqrt(u * u + v * v);
        points[i*3]   = u * size;
        points[i*3+1] = Math.sin(dist * Math.PI * frequency) * Math.cos(Math.atan2(v, u) * 2) * waveScale * (1 - dist);
        points[i*3+2] = v * size;
      }
      return points;
    }

    function createStarTexture() {
      const size = 64, canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const g = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
      g.addColorStop(0, 'rgba(255,255,255,1)');
      g.addColorStop(0.2, 'rgba(255,255,255,0.8)');
      g.addColorStop(0.5, 'rgba(255,255,255,0.3)');
      g.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, size, size);
      return new THREE.CanvasTexture(canvas);
    }

    function updateColorArray(colors, positionsArray) {
      const cs = COLOR_SCHEMES[CONFIG.colorScheme];
      const maxRadius = CONFIG.shapeSize * 1.1;
      for (let i = 0; i < CONFIG.particleCount; i++) {
        const i3 = i * 3;
        tempVec.fromArray(positionsArray, i3);
        const dist = tempVec.length();
        let hue;
        if (CONFIG.colorScheme === 'rainbow') {
          hue = ((tempVec.x / maxRadius + 1) / 2 * 120 + (tempVec.y / maxRadius + 1) / 2 * 120 + (tempVec.z / maxRadius + 1) / 2 * 120) % 360;
        } else {
          hue = THREE.MathUtils.mapLinear(dist, 0, maxRadius, cs.startHue, cs.endHue);
        }
        const n = (noise3D(tempVec.x * 0.2, tempVec.y * 0.2, tempVec.z * 0.2) + 1) * 0.5;
        const color = new THREE.Color().setHSL(
          hue / 360,
          THREE.MathUtils.clamp(cs.saturation * (0.9 + n * 0.2), 0, 1),
          THREE.MathUtils.clamp(cs.lightness * (0.85 + n * 0.3), 0.1, 0.9)
        );
        color.toArray(colors, i3);
      }
    }

    function updateColors() {
      const colors = particlesGeometry.attributes.color.array;
      updateColorArray(colors, particlesGeometry.attributes.position.array);
      particlesGeometry.attributes.color.needsUpdate = true;
    }

    function morphToIndex(nextIdx) {
      if (isMorphing) return;
      isMorphing = true;
      controls.autoRotate = false;
      sourcePositions.set(currentPositions);
      const nextTarget = targetPositions[nextIdx];
      const cof = CONFIG.shapeSize * CONFIG.swarmDistanceFactor;
      for (let i = 0; i < CONFIG.particleCount; i++) {
        const i3 = i * 3;
        sourceVec.fromArray(sourcePositions, i3);
        targetVec.fromArray(nextTarget, i3);
        swarmVec.lerpVectors(sourceVec, targetVec, 0.5);
        const offsetDir = tempVec.set(
          noise3D(i * 0.05, 10, 10),
          noise3D(20, i * 0.05, 20),
          noise3D(30, 30, i * 0.05)
        ).normalize();
        const distFactor = sourceVec.distanceTo(targetVec) * 0.1 + cof;
        swarmVec.addScaledVector(offsetDir, distFactor * (0.5 + Math.random() * 0.8));
        swarmPositions[i3] = swarmVec.x;
        swarmPositions[i3+1] = swarmVec.y;
        swarmPositions[i3+2] = swarmVec.z;
      }
      currentShapeIndex = nextIdx;
      morphState.progress = 0;
      if (morphTimeline) morphTimeline.pause();
      morphTimeline = anime({
        targets: morphState,
        progress: 1,
        duration: CONFIG.morphDuration,
        easing: 'cubicBezier(0.4, 0.0, 0.2, 1.0)',
        complete: () => {
          currentPositions.set(targetPositions[currentShapeIndex]);
          particlesGeometry.attributes.position.needsUpdate = true;
          particleEffectStrengths.fill(0.0);
          particlesGeometry.attributes.aEffectStrength.needsUpdate = true;
          sourcePositions.set(targetPositions[currentShapeIndex]);
          updateColors();
          isMorphing = false;
          controls.autoRotate = true;
          window.parent.postMessage({ type: 'shapeChanged', index: currentShapeIndex }, '*');
        }
      });
    }

    function triggerMorph() {
      morphToIndex((currentShapeIndex + 1) % SHAPES.length);
    }

    function setupPostProcessing() {
      composer = new EffectComposer(renderer);
      composer.addPass(new RenderPass(scene, camera));
      bloomPass = new UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight),
        CONFIG.bloomStrength, CONFIG.bloomRadius, CONFIG.bloomThreshold
      );
      composer.addPass(bloomPass);
    }

    function createStarfield() {
      const sv = [], ss = [], sc = [];
      for (let i = 0; i < CONFIG.starCount; i++) {
        tempVec.set(
          THREE.MathUtils.randFloatSpread(400),
          THREE.MathUtils.randFloatSpread(400),
          THREE.MathUtils.randFloatSpread(400)
        );
        if (tempVec.length() < 100) tempVec.setLength(100 + Math.random() * 300);
        sv.push(tempVec.x, tempVec.y, tempVec.z);
        ss.push(Math.random() * 0.15 + 0.05);
        const color = new THREE.Color();
        if (Math.random() < 0.1) { color.setHSL(Math.random(), 0.7, 0.65); }
        else { color.setHSL(0.6, Math.random() * 0.1, 0.8 + Math.random() * 0.2); }
        sc.push(color.r, color.g, color.b);
      }
      const sg = new THREE.BufferGeometry();
      sg.setAttribute('position', new THREE.Float32BufferAttribute(sv, 3));
      sg.setAttribute('color', new THREE.Float32BufferAttribute(sc, 3));
      sg.setAttribute('size', new THREE.Float32BufferAttribute(ss, 1));
      const starTex = createStarTexture();
      const sm = new THREE.ShaderMaterial({
        uniforms: { pointTexture: { value: starTex } },
        vertexShader: `attribute float size; varying vec3 vColor; void main() { vColor = color; vec4 mvp = modelViewMatrix * vec4(position, 1.0); gl_PointSize = size * (400.0 / -mvp.z); gl_Position = projectionMatrix * mvp; }`,
        fragmentShader: `uniform sampler2D pointTexture; varying vec3 vColor; void main() { float a = texture2D(pointTexture, gl_PointCoord).a; if (a < 0.1) discard; gl_FragColor = vec4(vColor, a * 0.9); }`,
        blending: THREE.AdditiveBlending, depthWrite: false, transparent: true, vertexColors: true
      });
      scene.add(new THREE.Points(sg, sm));
    }

    function setupParticleSystem() {
      targetPositions = SHAPES.map(s => s.generator(CONFIG.particleCount, CONFIG.shapeSize));
      particlesGeometry = new THREE.BufferGeometry();
      currentPositions = new Float32Array(targetPositions[0]);
      sourcePositions = new Float32Array(targetPositions[0]);
      swarmPositions = new Float32Array(CONFIG.particleCount * 3);
      particlesGeometry.setAttribute('position', new THREE.BufferAttribute(currentPositions, 3));
      particleSizes = new Float32Array(CONFIG.particleCount);
      particleOpacities = new Float32Array(CONFIG.particleCount);
      particleEffectStrengths = new Float32Array(CONFIG.particleCount);
      for (let i = 0; i < CONFIG.particleCount; i++) {
        particleSizes[i] = THREE.MathUtils.randFloat(CONFIG.particleSizeRange[0], CONFIG.particleSizeRange[1]);
        particleOpacities[i] = 1.0;
        particleEffectStrengths[i] = 0.0;
      }
      particlesGeometry.setAttribute('size', new THREE.BufferAttribute(particleSizes, 1));
      particlesGeometry.setAttribute('opacity', new THREE.BufferAttribute(particleOpacities, 1));
      particlesGeometry.setAttribute('aEffectStrength', new THREE.BufferAttribute(particleEffectStrengths, 1));
      const colors = new Float32Array(CONFIG.particleCount * 3);
      updateColorArray(colors, currentPositions);
      particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      particlesMaterial = new THREE.ShaderMaterial({
        uniforms: { pointTexture: { value: createStarTexture() } },
        vertexShader: `
          attribute float size; attribute float opacity; attribute float aEffectStrength;
          varying vec3 vColor; varying float vOpacity; varying float vEffectStrength;
          void main() {
            vColor = color; vOpacity = opacity; vEffectStrength = aEffectStrength;
            vec4 mvp = modelViewMatrix * vec4(position, 1.0);
            gl_PointSize = size * (1.0 - vEffectStrength * 0.50) * (400.0 / -mvp.z);
            gl_Position = projectionMatrix * mvp;
          }`,
        fragmentShader: `
          uniform sampler2D pointTexture;
          varying vec3 vColor; varying float vOpacity; varying float vEffectStrength;
          void main() {
            float a = texture2D(pointTexture, gl_PointCoord).a;
            if (a < 0.05) discard;
            gl_FragColor = vec4(vColor * (1.0 + vEffectStrength * 0.60), a * vOpacity);
          }`,
        blending: THREE.AdditiveBlending, depthTest: true, depthWrite: false, transparent: true, vertexColors: true
      });
      particleSystem = new THREE.Points(particlesGeometry, particlesMaterial);
      scene.add(particleSystem);
    }

    function updateMorphAnimation(positions, effectStrengths, elapsedTime, deltaTime) {
      const t = morphState.progress;
      const targets = targetPositions[currentShapeIndex];
      const effectStrength = Math.sin(t * Math.PI);
      const currentSwirl = effectStrength * CONFIG.swirlFactor * deltaTime * 50;
      const currentNoise = effectStrength * CONFIG.noiseMaxStrength;
      for (let i = 0; i < CONFIG.particleCount; i++) {
        const i3 = i * 3;
        sourceVec.fromArray(sourcePositions, i3);
        swarmVec.fromArray(swarmPositions, i3);
        targetVec.fromArray(targets, i3);
        const ti = 1 - t, ti2 = ti * ti, t2 = t * t;
        bezPos.copy(sourceVec).multiplyScalar(ti2);
        bezPos.addScaledVector(swarmVec, 2 * ti * t);
        bezPos.addScaledVector(targetVec, t2);
        if (currentSwirl > 0.01) {
          tempVec.subVectors(bezPos, sourceVec);
          swirlAxis.set(
            noise3D(i * 0.02, elapsedTime * 0.1, 0),
            noise3D(0, i * 0.02, elapsedTime * 0.1 + 5),
            noise3D(elapsedTime * 0.1 + 10, 0, i * 0.02)
          ).normalize();
          tempVec.applyAxisAngle(swirlAxis, currentSwirl * (0.5 + Math.random() * 0.5));
          bezPos.copy(sourceVec).add(tempVec);
        }
        if (currentNoise > 0.01) {
          const nt = elapsedTime * CONFIG.noiseTimeScale;
          noiseOffset.set(
            noise4D(bezPos.x * CONFIG.noiseFrequency, bezPos.y * CONFIG.noiseFrequency, bezPos.z * CONFIG.noiseFrequency, nt),
            noise4D(bezPos.x * CONFIG.noiseFrequency + 100, bezPos.y * CONFIG.noiseFrequency + 100, bezPos.z * CONFIG.noiseFrequency + 100, nt),
            noise4D(bezPos.x * CONFIG.noiseFrequency + 200, bezPos.y * CONFIG.noiseFrequency + 200, bezPos.z * CONFIG.noiseFrequency + 200, nt)
          );
          bezPos.addScaledVector(noiseOffset, currentNoise);
        }
        positions[i3] = bezPos.x;
        positions[i3+1] = bezPos.y;
        positions[i3+2] = bezPos.z;
        effectStrengths[i] = effectStrength;
      }
      particlesGeometry.attributes.aEffectStrength.needsUpdate = true;
    }

    function updateIdleAnimation(positions, effectStrengths, elapsedTime) {
      const breathScale = 1 + Math.sin(elapsedTime * 0.5) * 0.015;
      const timeScaled = elapsedTime * CONFIG.idleFlowSpeed;
      const freq = 0.1;
      let needsReset = false;
      for (let i = 0; i < CONFIG.particleCount; i++) {
        const i3 = i * 3;
        sourceVec.fromArray(sourcePositions, i3);
        tempVec.copy(sourceVec).multiplyScalar(breathScale);
        flowVec.set(
          noise4D(tempVec.x * freq, tempVec.y * freq, tempVec.z * freq, timeScaled),
          noise4D(tempVec.x * freq + 10, tempVec.y * freq + 10, tempVec.z * freq + 10, timeScaled),
          noise4D(tempVec.x * freq + 20, tempVec.y * freq + 20, tempVec.z * freq + 20, timeScaled)
        );
        tempVec.addScaledVector(flowVec, CONFIG.idleFlowStrength);
        currentVec.fromArray(positions, i3).lerp(tempVec, 0.05);
        positions[i3] = currentVec.x;
        positions[i3+1] = currentVec.y;
        positions[i3+2] = currentVec.z;
        if (effectStrengths[i] !== 0) { effectStrengths[i] = 0; needsReset = true; }
      }
      if (needsReset) particlesGeometry.attributes.aEffectStrength.needsUpdate = true;
    }

    function animate() {
      requestAnimationFrame(animate);
      if (!isInitialized) return;
      const elapsed = clock.getElapsedTime();
      const delta = clock.getDelta();
      controls.update();
      const pos = particlesGeometry.attributes.position.array;
      const es = particlesGeometry.attributes.aEffectStrength.array;
      if (isMorphing) { updateMorphAnimation(pos, es, elapsed, delta); }
      else { updateIdleAnimation(pos, es, elapsed); }
      particlesGeometry.attributes.position.needsUpdate = true;
      composer.render(delta);
    }

    function init() {
      let progress = 0;
      const progressBar = document.getElementById('progress');
      const loadingScreen = document.getElementById('loading');
      function up(n) {
        progress += n;
        progressBar.style.width = `${Math.min(100, progress)}%`;
        if (progress >= 100) {
          setTimeout(() => {
            loadingScreen.style.opacity = '0';
            setTimeout(() => {
              loadingScreen.style.display = 'none';
              window.parent.postMessage({ type: 'heroReady' }, '*');
            }, 600);
          }, 200);
        }
      }

      const isDesktop = window.innerWidth >= 768;

      clock = new THREE.Clock();
      noise3D = createNoise3D(() => Math.random());
      noise4D = createNoise4D(() => Math.random());
      scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x000308, 0.03);
      up(5);

      camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 8, 28);
      camera.lookAt(scene.position);
      up(5);

      const canvas = document.getElementById('webglCanvas');
      renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true, powerPreference: 'high-performance' });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.1;
      up(10);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.minDistance = 5;
      controls.maxDistance = 80;
      controls.autoRotate = true;
      controls.autoRotateSpeed = 0.3;
      up(5);

      if (isDesktop) {
        // Câmera olha para a esquerda: a forma (na origem) aparece no lado direito
        controls.target.set(-15, 0, 0);
        controls.update();
      }

      scene.add(new THREE.AmbientLight(0x404060));
      const dl1 = new THREE.DirectionalLight(0xffffff, 1.5);
      dl1.position.set(15, 20, 10);
      scene.add(dl1);
      const dl2 = new THREE.DirectionalLight(0x88aaff, 0.9);
      dl2.position.set(-15, -10, -15);
      scene.add(dl2);
      up(10);

      setupPostProcessing(); up(10);
      createStarfield(); up(15);
      setupParticleSystem(); up(25);

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
      });
      window.addEventListener('click', () => triggerMorph());
      window.addEventListener('message', (e) => {
        if (e.data?.type === 'morphTo') morphToIndex(e.data.index);
      });
      up(15);

      isInitialized = true;
      animate();
    }

    init();
  </script>
</body>
</html>
